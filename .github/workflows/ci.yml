name: CI and GitHub Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build Next.js static export
        run: npm run build

      - name: Inspect exported files
        run: |
          ls -la
          ls -la out
          find out -maxdepth 2 -type f | sort | sed -n '1,120p'
          test -f out/index.html
          grep -n "入力フォーム" out/index.html

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload GitHub Pages artifact
        # Publish only from main, both for automatic pushes and manual dispatches.
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    # Publish only from main, both for automatic pushes and manual dispatches.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
